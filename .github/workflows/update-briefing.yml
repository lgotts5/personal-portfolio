name: Update Market Briefing

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9am ET / 8am CT, weekdays only
  workflow_dispatch:           # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4

      - name: Run briefing updater
        run: python scripts/update_briefing.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/market_briefing.md
          git diff --cached --quiet || git commit -m "chore: update market briefing"
          git push
